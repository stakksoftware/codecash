<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CodeCash — not found</title>
    <meta name="theme-color" content="#0e9f6e" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230e9f6e'/%3E%3Crect x='7' y='7' width='18' height='18' rx='5' fill='none' stroke='white' stroke-opacity='.92' stroke-width='3'/%3E%3C/svg%3E" />
    <script>
      (function () { try { var t = localStorage.getItem('cc_theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'); document.documentElement.setAttribute('data-theme', t); } catch (e) {} })();
    </script>
    <style>
      :root { --paper: #fff; --bg: #f7f7f5; --ink: #111113; --ink2: #52525b; --line: rgba(17,17,19,.09); --accent: #0e9f6e;
        --sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Inter, system-ui, sans-serif; --mono: "SF Mono", ui-monospace, Menlo, monospace; }
      html[data-theme="dark"] { --paper: #15181e; --bg: #0b0c0e; --ink: #e9edf3; --ink2: #aab2bf; --line: rgba(255,255,255,.10); --accent: #34d399; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: var(--bg); color: var(--ink); font-family: var(--sans); text-align: center; padding: 24px; }
      .mark { width: 40px; height: 40px; border-radius: 12px; background: var(--accent); box-shadow: inset 0 0 0 5px color-mix(in srgb, var(--bg) 80%, transparent); margin: 0 auto 22px; }
      .code { font-family: var(--mono); color: var(--accent); font-size: 13px; letter-spacing: .12em; }
      h1 { font-size: 30px; letter-spacing: -.03em; font-weight: 600; margin: 10px 0 6px; }
      p { color: var(--ink2); margin: 0 0 24px; }
      a { display: inline-flex; align-items: center; gap: 7px; background: var(--accent); color: #fff; text-decoration: none; padding: 11px 20px; border-radius: 11px; font-weight: 550; font-size: 15px; }
      a:hover { filter: brightness(1.05); }
    </style>
  </head>
  <body>
    <div>
      <div class="mark"></div>
      <div class="code">404 · NOT FOUND</div>
      <h1>This page is taking a wait-state.</h1>
      <p>The page you're after doesn't exist — but your spinner time still could.</p>
      <a href="/">← Back to CodeCash</a>
    </div>
  </body>
</html>
